<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f7f9fb;
      color: #1f2937;
    }
    h1 {
      color: #0f172a;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
      background: #fff;
    }
    th, td {
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid #e2e8f0;
    }
    th {
      background-color: #e2e8f0;
      color: #0f172a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.85rem;
    }
    tr:hover {
      background-color: #f1f5f9;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Company Employee Directory</h1>
    <p>This employee list is loaded from the backend service.</p>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Title</th>
          <th>Department</th>
          <th>Location</th>
        </tr>
      </thead>
      <tbody id="employee-table-body"></tbody>
    </table>
    <p id="status" style="margin-top: 1rem; color: #334155;">Loading employee list...</p>
  </div>

  <script>
    async function loadEmployees() {
      const status = document.getElementById('status');
      const tbody = document.getElementById('employee-table-body');
      try {
        const response = await fetch('/employees');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const employees = await response.json();
        tbody.innerHTML = employees.map(emp => `
          <tr>
            <td>${emp.id}</td>
            <td>${emp.name}</td>
            <td>${emp.title}</td>
            <td>${emp.department}</td>
            <td>${emp.location}</td>
          </tr>
        `).join('');
        status.textContent = `Loaded ${employees.length} employees from backend.`;
      } catch (error) {
        status.textContent = `Failed to load employees: ${error.message}`;
      }
    }

    loadEmployees();
  </script>
</body>
</html>
