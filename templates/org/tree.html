{% extends 'base.html' %}
{% block title %}Org Tree — HR Portal{% endblock %}
{% block page_title %}Organisation Tree{% endblock %}

{% block content %}
<div class="page">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
    <div>
      <h1 style="font-size:1.25rem;font-weight:700;margin-bottom:2px">Organisation Tree</h1>
      <p id="tree-subtitle" style="font-size:.8rem;color:#64748b">Loading…</p>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-ghost btn-sm" onclick="expandAll()">Expand All</button>
      <button class="btn btn-ghost btn-sm" onclick="collapseAll()">Collapse All</button>
    </div>
  </div>

  <!-- ── Navigation bar ─────────────────────────────────────── -->
  <div id="org-nav" class="org-nav"></div>

  <!-- ── Legend ─────────────────────────────────────────────── -->
  <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:#64748b">
      <div style="width:12px;height:12px;border-radius:50%;background:#8b5cf6"></div> You
    </div>
    <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:#64748b">
      <div style="width:18px;height:2px;background:#e2e8f0"></div> Reports to
    </div>
    <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:#64748b">
      <svg width="12" height="12" fill="none" stroke="#94a3b8" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35"/><circle cx="11" cy="11" r="8"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      Focus on their team
    </div>
    <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:#64748b">
      Click card → view profile
    </div>
  </div>

  <!-- ── Family tree ────────────────────────────────────────── -->
  <div class="ftree-wrap">
    <div id="ftree-root"></div>
  </div>

  <div class="status-bar" id="status-bar" style="display:none">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text"></span>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const OWN_ID        = {{ own_emp_id | tojson }};
const AVATAR_COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#ef4444','#6366f1'];

let focusId       = OWN_ID;
let pendingCounts = {};

function avatarColor(n) {
  let h = 0;
  for (const c of n) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function initials(fn, ln) { return ((fn||'')[0] + (ln||'')[0]).toUpperCase(); }

// ── Navigation bar ────────────────────────────────────────────────────────────
function renderNav(focus, ancestors) {
  const nav = document.getElementById('org-nav');
  if (!focus) { nav.innerHTML = ''; return; }

  const fullName  = focus.first_name + ' ' + focus.last_name;
  const directMgr = ancestors.length ? ancestors[ancestors.length - 1] : null;

  // Breadcrumb
  const bcParts = ancestors.map(a =>
    `<button class="org-bc-item" onclick="focusTree('${a.id}')" title="${a.job_title||''}">${a.first_name} ${a.last_name}</button><span class="org-bc-sep">›</span>`
  ).join('') + `<span class="org-bc-current">${fullName}</span>`;

  const backBtn = (focusId !== OWN_ID)
    ? `<button class="org-back-btn" onclick="focusTree('${OWN_ID}')">← My view</button>`
    : '';

  const upHtml = directMgr
    ? `<button class="org-up-btn" onclick="focusTree('${directMgr.id}')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
        <span>${directMgr.first_name} ${directMgr.last_name}</span>
        <span class="org-up-role">${directMgr.job_title||''}</span>
       </button>`
    : `<span class="org-up-top">&#8679; Top of organisation</span>`;

  nav.innerHTML = `
    <div class="org-nav-top">
      ${upHtml}
      <button class="org-locate-btn" onclick="locateMe()" title="Highlight my position in this tree">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8"/>
        </svg>
        Locate me
      </button>
      ${backBtn}
    </div>
    <div class="org-nav-bc">${bcParts}</div>
  `;
}

// ── Build a family-tree node ──────────────────────────────────────────────────
function buildNode(data) {
  const wrap     = document.createElement('div');
  wrap.className = 'ft-node';

  const fullName = (data.first_name||'') + ' ' + (data.last_name||'');
  const isSelf   = data.id === OWN_ID;
  const hasKids  = data.children && data.children.length > 0;

  // ── Card (links to profile) ────────────────────────────────
  const card     = document.createElement('a');
  card.href      = '/profile/' + data.id;
  card.className = 'ft-card' + (isSelf ? ' is-self' : '');
  card.title     = 'View profile';
  card.onclick   = e => e.stopPropagation();

  const av = document.createElement('div');
  av.className        = 'ft-avatar';
  av.style.background = isSelf ? '#8b5cf6' : avatarColor(fullName);
  av.textContent      = initials(data.first_name, data.last_name);
  card.appendChild(av);

  const nameEl = document.createElement('div');
  nameEl.className = 'ft-name';
  nameEl.innerHTML  = `${fullName}${isSelf ? ' <span class="org-self-tag">you</span>' : ''}`;
  card.appendChild(nameEl);

  const titleEl = document.createElement('div');
  titleEl.className   = 'ft-title';
  titleEl.textContent = data.job_title || '—';
  card.appendChild(titleEl);

  if (data.location) {
    const loc = document.createElement('div');
    loc.className   = 'ft-loc';
    loc.textContent = '📍 ' + data.location;
    card.appendChild(loc);
  }

  // Pending vacation badge
  const pendingN = pendingCounts[data.id] || 0;
  if (pendingN > 0) {
    const pb = document.createElement('a');
    pb.href      = '/vacation/team';
    pb.className = 'ft-pending-badge';
    pb.title     = `${pendingN} pending vacation request${pendingN > 1 ? 's' : ''}`;
    pb.textContent = pendingN;
    pb.onclick   = e => e.stopPropagation();
    card.appendChild(pb);
  }

  // Focus-down button (zoom into their team)
  if (hasKids && !isSelf) {
    const fb = document.createElement('button');
    fb.className = 'ft-focus-btn';
    fb.title     = 'Focus tree on their team';
    fb.innerHTML = `<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
    </svg>`;
    fb.onclick = e => { e.preventDefault(); e.stopPropagation(); focusTree(data.id); };
    card.appendChild(fb);
  }

  wrap.appendChild(card);

  // ── Children branch ────────────────────────────────────────
  if (hasKids) {
    const toggle     = document.createElement('button');
    toggle.className = 'ft-toggle open';
    toggle.innerHTML = `▾ <span>${data.children.length}</span>`;

    const branch     = document.createElement('div');
    branch.className = 'ft-branch';

    const stem = document.createElement('div');
    stem.className = 'ft-stem';

    const row     = document.createElement('div');
    row.className = 'ft-row';

    data.children
      .sort((a, b) => (a.last_name||'').localeCompare(b.last_name||''))
      .forEach(child => row.appendChild(buildNode(child)));

    branch.appendChild(stem);
    branch.appendChild(row);

    toggle.onclick = e => {
      e.preventDefault(); e.stopPropagation();
      const collapsing = !branch.classList.contains('ft-collapsed');
      branch.classList.toggle('ft-collapsed', collapsing);
      const n = toggle.querySelector('span').textContent;
      toggle.innerHTML = (collapsing ? '▸ ' : '▾ ') + `<span>${n}</span>`;
      toggle.classList.toggle('open', !collapsing);
    };

    wrap.appendChild(toggle);
    wrap.appendChild(branch);
  }

  return wrap;
}

// ── Focus tree on a person ────────────────────────────────────────────────────
async function focusTree(empId) {
  focusId = empId;
  await Promise.all([loadTree(empId), loadContext(empId)]);
}

async function loadContext(empId) {
  try {
    const res  = await fetch('/api/org-tree/context?of=' + empId);
    const data = await res.json();
    renderNav(data.focus, data.ancestors);
  } catch (_) {}
}

// ── Load & render tree ────────────────────────────────────────────────────────
async function loadTree(rootId) {
  const sb  = document.getElementById('status-bar');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  sb.style.display = 'flex';
  dot.className    = 'status-dot loading';
  txt.textContent  = 'Loading…';

  try {
    const res  = await fetch('/api/org-tree?root=' + rootId);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const container = document.getElementById('ftree-root');
    container.innerHTML = '';

    const roots = Array.isArray(data) ? data : (data ? [data] : []);
    if (!roots.length) {
      container.innerHTML = '<p style="color:#94a3b8;font-size:.85rem;padding:16px 0">No reporting structure found.</p>';
      dot.className = 'status-dot error';
      txt.textContent = 'No data';
      return;
    }

    // Wrap multiple roots in a row
    if (roots.length === 1) {
      container.appendChild(buildNode(roots[0]));
    } else {
      const row = document.createElement('div');
      row.className = 'ft-row';
      roots.forEach(r => row.appendChild(buildNode(r)));
      container.appendChild(row);
    }

    const total = roots.reduce((s, r) => s + countNodes(r), 0);
    const depth = Math.max(...roots.map(maxDepth));
    document.getElementById('tree-subtitle').textContent =
      `${total} employee${total !== 1 ? 's' : ''} · ${depth} level${depth !== 1 ? 's' : ''}`;
    dot.className   = 'status-dot';
    txt.textContent = `${total} nodes rendered`;

    // If the root has no direct reports, show a hint to navigate upward
    if (total === 1 && roots[0].id === focusId) {
      const hint = document.createElement('div');
      hint.className = 'ft-no-reports-hint';
      hint.innerHTML = `
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        You have no direct reports &mdash; use <strong>↑</strong> above to explore the organisation tree`;
      container.appendChild(hint);
    }
  } catch (err) {
    document.getElementById('ftree-root').innerHTML =
      `<p style="color:#ef4444">Failed to load: ${err.message}</p>`;
    dot.className   = 'status-dot error';
    txt.textContent = err.message;
  }
}

function countNodes(n) { return 1 + (n.children||[]).reduce((s,c) => s + countNodes(c), 0); }
function maxDepth(n)   { return !(n.children||[]).length ? 1 : 1 + Math.max(...n.children.map(maxDepth)); }

// ── Locate me ─────────────────────────────────────────────────────────────────
function locateMe() {
  const selfCard = document.querySelector('.ft-card.is-self');

  if (!selfCard) {
    // My card is not in this subtree — navigate to own view where I'm always visible
    focusTree(OWN_ID);
    return;
  }

  // Expand every collapsed branch that is an ancestor of my card
  let el = selfCard.parentElement;
  while (el && el !== document.getElementById('ftree-root')) {
    if (el.classList.contains('ft-branch') && el.classList.contains('ft-collapsed')) {
      el.classList.remove('ft-collapsed');
      const toggle = el.previousElementSibling;
      if (toggle && toggle.classList.contains('ft-toggle')) {
        const n = toggle.querySelector('span')?.textContent || '';
        toggle.innerHTML = `▾ <span>${n}</span>`;
        toggle.classList.add('open');
      }
    }
    el = el.parentElement;
  }

  // Scroll my card into the centre of the viewport
  selfCard.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });

  // Pulse ring animation to draw the eye
  selfCard.classList.remove('ft-locating'); // reset if already running
  void selfCard.offsetWidth;               // force reflow
  selfCard.classList.add('ft-locating');
  setTimeout(() => selfCard.classList.remove('ft-locating'), 2400);
}

// ── Expand / Collapse all ─────────────────────────────────────────────────────
function expandAll() {
  document.querySelectorAll('.ft-branch').forEach(el => el.classList.remove('ft-collapsed'));
  document.querySelectorAll('.ft-toggle').forEach(btn => {
    const n = btn.querySelector('span')?.textContent || '';
    btn.innerHTML = `▾ <span>${n}</span>`;
    btn.classList.add('open');
  });
}
function collapseAll() {
  // Skip the root node's direct branch so the user always sees something
  document.querySelectorAll('.ft-node .ft-node .ft-branch').forEach(el => el.classList.add('ft-collapsed'));
  document.querySelectorAll('.ft-node .ft-node .ft-toggle').forEach(btn => {
    const n = btn.querySelector('span')?.textContent || '';
    btn.innerHTML = `▸ <span>${n}</span>`;
    btn.classList.remove('open');
  });
}

async function loadPendingCounts() {
  try {
    const res = await fetch('/api/vacation/team-pending-counts');
    if (res.ok) pendingCounts = await res.json();
  } catch (_) {}
}

// ── Initial load ──────────────────────────────────────────────────────────────
loadPendingCounts().then(() => focusTree(OWN_ID));
</script>
{% endblock %}
